AWSTemplateFormatVersion: '2010-09-09'
Description: 'Development environment with VPC and EC2 instance'

Parameters:
  SystemName:
    Type: String
    Default: example
    Description: System name for resource naming
  
  EnvName:
    Type: String
    Default: dev
    Description: Environment name for resource naming (dev, stg, prod)
  
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  
  PublicSubnetCidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the public subnet
  
  PrivateSubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the private subnet
  
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
  
  KeyPairName:
    Type: String
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Default: ''
  
  SubSystem:
    Type: String
    Default: example
    Description: Subsystem name for resource tagging
  
  Project:
    Type: String
    Default: project
    Description: Project name for resource tagging

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-vpc
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-igw
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Attach Internet Gateway to VPC
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  
  # Public Subnet
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-subnet-public-az1
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Private Subnet
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-subnet-private-az1
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-rtb-public
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Private Route Table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-rtb-private
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # Public Route
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  
  # Associate Public Subnet with Public Route Table
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  
  # Associate Private Subnet with Private Route Table
  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable
  
  # Security Group for EC2
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-sg-web-ec2
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
  
  # EC2 Instance
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyPairName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: !Sub ${SystemName}-${EnvName}-ec2-web
        - Key: Env
          Value: !Ref EnvName
        - Key: System
          Value: !Ref SystemName
        - Key: SubSystem
          Value: !Ref SubSystem
        - Key: Project
          Value: !Ref Project
        - Key: CmBillingGroup
          Value: !Ref Project

  # Latest Amazon Linux 2 AMI
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyPairName, '']]

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${SystemName}-${EnvName}-vpc-id
  
  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub ${SystemName}-${EnvName}-public-subnet-id
  
  PrivateSubnetId:
    Description: Private Subnet ID
    Value: !Ref PrivateSubnet
    Export:
      Name: !Sub ${SystemName}-${EnvName}-private-subnet-id
  
  EC2SecurityGroupId:
    Description: Security Group ID for EC2
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub ${SystemName}-${EnvName}-ec2-sg-id
  
  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
    Export:
      Name: !Sub ${SystemName}-${EnvName}-ec2-instance-id
  
  EC2PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub ${SystemName}-${EnvName}-ec2-public-ip